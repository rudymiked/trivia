name: API Smoke Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'api/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'api/**'
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    environment: Production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'api/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./api
        run: npm install

      - name: Build API
        working-directory: ./api
        run: npm run build

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Start Functions Host
        working-directory: ./api
        run: func start > /tmp/func.log 2>&1 &
        env:
          FUNCTIONS_WORKER_RUNTIME: node
          AzureWebJobsStorage: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          GOOGLE_CLIENT_ID_WEB: ${{ secrets.GOOGLE_CLIENT_ID_WEB }}
          SMOKE_TEST_SECRET: ${{ secrets.SMOKE_TEST_SECRET }}

      - name: Wait for Functions Host
        run: |
          echo "Waiting for Functions host on port 7071..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:7071/api/puzzle > /dev/null 2>&1; then
              echo "Functions host is ready"
              exit 0
            fi
            sleep 3
          done
          echo "Functions host failed to start. Log:"
          cat /tmp/func.log
          exit 1

      - name: Seed locations
        working-directory: .
        run: npm run seed
        env:
          API_URL: http://localhost:7071/api

      - name: Run smoke tests
        working-directory: ./api
        run: npm run test:smoke
        env:
          SMOKE_TEST_SECRET: ${{ secrets.SMOKE_TEST_SECRET }}
          API_URL: http://localhost:7071/api
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: api/coverage/
          retention-days: 30
      
      - name: Post test summary
        if: always()
        run: |
          echo "## 🧪 Smoke Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Core journeys validated" >> $GITHUB_STEP_SUMMARY
          echo "✅ Duplicate prevention tested" >> $GITHUB_STEP_SUMMARY
          echo "✅ Error handling verified" >> $GITHUB_STEP_SUMMARY
